services:
  postgres:
    image: postgres:16-alpine
    container_name: study-lang-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studylang
      POSTGRES_PASSWORD: studylang
      POSTGRES_DB: studylang
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studylang -d studylang"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: study-lang-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU 사용을 원하면 아래 주석을 해제하세요 (NVIDIA Container Toolkit 필요).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: study-lang-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@studylang.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  ollama_data:
